<div class="col">
  <div class="card shadow-sm">
    <img [src]="member.photoUrl" alt="img">
    <div class="card-body">
      <p class="card-text">{{member.userName}}-{{member.age}}</p>
      <div class="d-flex justify-content-between align-items-center">
        <div class="btn-group">
          <button type="button"  [routerLink]="['/members',member.userName]"  class="btn btn-sm btn-outline-secondary"><i  class="far fa-eye"></i></button>
          <button type="button" class="btn btn-sm btn-outline-secondary"> <i class="fab fa-comment-dots"></i></button>
        </div>
        <small class="text-body-secondary  fw-bold">{{member.lastActive | date}}</small>
      </div>
    </div>
  </div>
</div>
