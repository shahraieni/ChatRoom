<div class="p-3">
  <div class="row">
    <div class="col-md-4">
      <div class="card">
        <img  class="img-fluid img-thumbnail" [src]="member.photoURL || './assets/images/user.png'" [alt]="member.knowAs"

        />
        <div class="card-body">
          <div class="mb-2">
            <i class="fa fa-user-circle text-success"></i> Online now
          </div>
          <div>
            <strong>location:</strong>
            <p>{{ member.city }}, {{ member.contry }}</p>
          </div>
          <div>
            <strong>userName:</strong>
            <p>{{ member.userName }}</p>
          </div>
          <div>
            <strong>Age:</strong>
            <p>{{ member.age }}</p>
          </div>
          <div>
            <strong>Last Active:</strong>
            <p>{{ member.lastActive| date:'dd MMM yyyy' }}</p>
          </div>
        </div>
        <div class="card-footer">
          <div class="btn-group d-flex">
            <button class="btn btn-primary">Like</button>
            <button class="btn btn-success">Message</button>
          </div>
        </div>
      </div>
    </div>
    <div class="col-md-8">

      <tabset class="member-tabset" >
        <tab    class="mt-3 p-2" heading="About {{ member?.userName }}" >
          <p> Description</p>
          <p>{{ member.knowAs }}</p>
        </tab>
        <tab   heading="images"  class="mt-3 p-2" heading="Photos">
                <p>imagees</p>
        </tab>
        <tab heading="Messages" class="mt-3 p-2" >
          <p>Messages</p>

        </tab>
      </tabset>
    </div>
  </div>
</div>
